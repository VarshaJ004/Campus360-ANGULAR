<!DOCTYPE html>
<html ng-app="Campus360">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content ="width=device-width,initial-scale=1.0">
    <script src ="node_modules/angular/angular.min.js"></script>
    <script src="js/app.js"></script>
    <title>College Dashboard</title>
</head>

<body ng-controller="dashboardcontroller">
<input type="text" ng-model="collegename" placeholder="Enter College Name">
<input type="number" ng-model="totalstudents" placeholder="Enter Total Students">
<input type="number" ng-model="totalfaculty" placeholder="Enter Total Faculty">
<h1>{{collegename}}</h1>

<p>Total Students : {{totalstudents}}</p>
<button ng-click="totalstudents=totalstudents+1">ADD STUDENT</button>

<p>Total Faculty : {{totalfaculty}}</p>


<h2>Student List</h2>
<ul>


    <li ng-repeat="student in students">
        {{student.name}}
    </li>

    </li>
</ul>

</body>
</html>
